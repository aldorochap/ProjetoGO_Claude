version: '3.8'

services:

  # ─────────────────────────────────────────
  #  Zookeeper
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/2181 && echo srvr >&3 && cat <&3 | grep -q 'Zookeeper version'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  #  Kafka Broker
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"   # acesso externo / localhost
      - "9101:9101"   # JMX (métricas)
    environment:
      # Conexão com Zookeeper
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Identificação do broker
      KAFKA_BROKER_ID: 1

      # ── Listeners ──────────────────────────────────────────────────────────
      # INTERNAL  → comunicação container-a-container (dentro do Docker network)
      # EXTERNAL  → conexões vindas do host / localhost
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # ── Tópicos e replicação ────────────────────────────────────────────────
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3

      # ── Retenção de logs ────────────────────────────────────────────────────
      KAFKA_LOG_RETENTION_HOURS: 168          # 7 dias
      KAFKA_LOG_SEGMENT_BYTES: 1073741824     # 1 GB por segmento
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000

      # ── Performance ─────────────────────────────────────────────────────────
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # ── JMX (métricas) ──────────────────────────────────────────────────────
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost

    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  #  Kafka UI  (opcional — remova se não quiser)
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

# ─────────────────────────────────────────
#  Volumes persistentes
# ─────────────────────────────────────────
volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:

# ─────────────────────────────────────────
#  Rede isolada
# ─────────────────────────────────────────
networks:
  default:
    name: kafka-network
    driver: bridge